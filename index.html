<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="培训师学习平台：TTT 学习路径、场景演练、知识卡、工具箱和进度复盘。"
    />
    <title>TTT Trainer Lab | 培训师学习平台</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <a class="brand" href="#dashboard" aria-label="回到首页">
          <span class="brand-mark">T</span>
          <span>
            <strong>TTT Trainer Lab</strong>
            <small>培训经理成长演练场</small>
          </span>
        </a>
        <nav class="desktop-nav" aria-label="主导航">
          <a href="#dashboard" data-route-link="dashboard">首页</a>
          <a href="#learn" data-route-link="learn">学习</a>
          <a href="#practice" data-route-link="practice">演练</a>
          <a href="#tools" data-route-link="tools">工具</a>
          <a href="#progress" data-route-link="progress">进度</a>
        </nav>
      </header>

      <main id="app" tabindex="-1"></main>
    </div>

    <nav class="mobile-nav" aria-label="底部导航">
      <a href="#dashboard" data-route-link="dashboard"><span>首页</span></a>
      <a href="#learn" data-route-link="learn"><span>学习</span></a>
      <a href="#practice" data-route-link="practice"><span>演练</span></a>
      <a href="#tools" data-route-link="tools"><span>工具</span></a>
      <a href="#progress" data-route-link="progress"><span>进度</span></a>
    </nav>

    <div class="toast" id="toast" role="status" aria-live="polite"></div>
    <script src="./app.js" defer></script>
  </body>
</html>
