<style>

  .nav-icon { font-size: 18px; display: block; margin-bottom: 2px; }

  .page { display: none; padding: 0 0 80px; animation: fadeIn 0.2s ease; }

  .scene-desc { font-size: 12px; color: var(--text2); margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

  .chat-role { font-size: 11px; color: var(--text2); }
  .chat-messages { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 12px; }
  .msg { max-width: 82%; }
  .msg.user { align-self: flex-end; }
  .msg.ai { align-self: flex-start; }
  .msg-bubble { padding: 10px 14px; border-radius: 16px; font-size: 14px; line-height: 1.6; }

  .chat-input-area { padding: 12px 16px; border-top: 0.5px solid var(--border); background: var(--bg); flex-shrink: 0; }
  .chat-input-row { display: flex; gap: 8px; align-items: flex-end; }
  .chat-input { flex: 1; background: var(--bg3); border: 0.5px solid var(--border2); border-radius: 20px; padding: 10px 16px; font-size: 14px; color: var(--text); resize: none; max-height: 100px; font-family: var(--font); line-height: 1.5; }

  .send-btn:disabled { background: var(--bg4); color: var(--text3); }
  .chat-hint { font-size: 11px; color: var(--text3); text-align: center; margin-bottom: 8px; }
  .scenario-intro { background: var(--accent-soft); border: 0.5px solid rgba(124,106,245,0.25); border-radius: 12px; padding: 12px; margin-bottom: 16px; }
  .intro-title { font-size: 12px; color: var(--accent); font-weight: 500; margin-bottom: 4px; }
  .intro-text { font-size: 13px; color: var(--text2); line-height: 1.6; }

  .module-card { background: var(--bg2); border: 0.5px solid var(--border); border-radius: 14px; margin: 0 16px 10px; overflow: hidden; cursor: pointer; }
  .module-header { display: flex; align-items: center; gap: 12px; padding: 14px; }
  .module-icon { font-size: 24px; }
  .module-title { font-size: 14px; font-weight: 500; flex: 1; }
  .module-status { font-size: 11px; padding: 3px 8px; border-radius: 8px; }
  .status-done { background: var(--green-soft); color: var(--green); }
  .status-todo { background: var(--bg4); color: var(--text3); }
  .chevron { color: var(--text3); transition: transform 0.25s; font-style: normal; }
  .module-card.open .chevron { transform: rotate(90deg); }
  .module-body { display: none; padding: 0 14px 14px; border-top: 0.5px solid var(--border); }
  .module-card.open .module-body { display: block; }
  .knowledge-section { margin-top: 12px; }
  .ks-title { font-size: 12px; color: var(--accent); font-weight: 500; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.05em; }
  .ks-item { display: flex; gap: 8px; font-size: 13px; color: var(--text2); line-height: 1.6; margin-bottom: 6px; }
  .ks-item::before { content: '·'; color: var(--accent); flex-shrink: 0; }
  .script-box { background: var(--bg3); border-left: 2px solid var(--accent); border-radius: 0 8px 8px 0; padding: 10px 12px; margin-top: 8px; font-size: 13px; color: var(--text); line-height: 1.7; }
  .script-label { font-size: 11px; color: var(--accent); margin-bottom: 4px; }

  .progress-ring { display: flex; align-items: center; gap: 16px; padding: 20px 16px; }
  .ring-wrap { position: relative; width: 72px; height: 72px; flex-shrink: 0; }
  .ring-svg { transform: rotate(-90deg); }
  .ring-text { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; }
  .ring-num { font-size: 18px; font-weight: 600; color: var(--text); }
  .ring-unit { font-size: 10px; color: var(--text3); }
  .ring-info { flex: 1; }
  .ring-info-title { font-size: 16px; font-weight: 500; }
  .ring-info-sub { font-size: 12px; color: var(--text2); margin-top: 4px; }

  .stat-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; padding: 0 16px 16px; }
  .stat-box { background: var(--bg2); border: 0.5px solid var(--border); border-radius: 12px; padding: 12px; text-align: center; }
  .stat-num { font-size: 20px; font-weight: 600; color: var(--text); }
  .stat-label { font-size: 11px; color: var(--text2); margin-top: 2px; }

  .section-label { font-size: 12px; color: var(--text3); font-weight: 500; letter-spacing: 0.05em; text-transform: uppercase; padding: 16px 16px 8px; }

  .streak-bar { display: flex; gap: 5px; padding: 0 16px 16px; }
  .streak-day { flex: 1; height: 8px; border-radius: 4px; background: var(--bg4); }
  .streak-day.done { background: var(--accent); }
  .streak-day.today { background: var(--green); }

  .tip-card { background: var(--amber-soft); border: 0.5px solid rgba(240,168,48,0.25); border-radius: 12px; padding: 12px 14px; margin: 0 16px 12px; }

</style>
</head>

let currentScene = null;
let messages = [];
let completedScenes = JSON.parse(localStorage.getItem('completedScenes') || '[]');
let isLoading = false;

function updateStatCount() {
  document.getElementById('stat-scenes').textContent = completedScenes.length;
}

function getCatBg(cat) {
  const map = { op:'rgba(240,168,48,0.15)', ceo:'rgba(224,90,90,0.15)', sm:'rgba(61,191,130,0.15)', hr:'rgba(124,106,245,0.15)', int:'rgba(100,160,255,0.15)' };
  return map[cat] || 'rgba(124,106,245,0.15)';
}

function renderScenes(filter = 'all') {
  const list = document.getElementById('scene-list');
  const filtered = filter === 'all' ? SCENES : SCENES.filter(s => s.cat === filter);
  list.innerHTML = filtered.map(s => `
    <div class="scene-card" onclick="openScene(${s.id})">
      <div class="scene-icon" style="background:${getCatBg(s.cat)}">${s.icon}</div>
      <div class="scene-content">
        <div class="scene-title">${s.title}</div>
        <div class="scene-desc">${s.desc}</div>
      </div>
      <div style="display:flex;flex-direction:column;align-items:flex-end;gap:5px;flex-shrink:0;">
        <span class="scene-badge ${s.badge}">${s.badgeText}</span>
        ${completedScenes.includes(s.id) ? '<span style="font-size:14px;color:var(--green);">✓</span>' : ''}
      </div>
    </div>
  `).join('');
}

function filterScenes(cat, el) {
  document.querySelectorAll('.filter-tag').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  renderScenes(cat);
}

function renderKnowledge() {
  const list = document.getElementById('knowledge-list');
  list.innerHTML = KNOWLEDGE.map(k => `
    <div class="module-card" id="mod-${k.id}" onclick="toggleModule('${k.id}')">
      <div class="module-header">
        <span class="module-icon">${k.icon}</span>
        <span class="module-title">${k.title}</span>
        <span class="module-status ${k.status === 'done' ? 'status-done' : 'status-todo'}">${k.status === 'done' ? '已掌握' : '待学习'}</span>
        <i class="chevron">›</i>
      </div>
      <div class="module-body">
        ${k.sections.map(sec => `
          <div class="knowledge-section">
            <div class="ks-title">${sec.title}</div>
            ${sec.script
              ? `<div class="script-box"><div class="script-label">参考话术</div>${sec.text}</div>`
              : sec.items.map(item => `<div class="ks-item">${item}</div>`).join('')
            }
          </div>
        `).join('')}
      </div>
    </div>
  `).join('');
}

function toggleModule(id) {
  document.getElementById(`mod-${id}`).classList.toggle('open');
}

function openScene(id) {
  const scene = SCENES.find(s => s.id === id);
  if (!scene) return;
  currentScene = scene;
  messages = [];
  document.getElementById('chat-scene-title').textContent = scene.title;
  document.getElementById('chat-scene-role').textContent = `AI扮演：${scene.role} · ${scene.difficulty}`;
  const chatMsgs = document.getElementById('chat-messages');
  chatMsgs.innerHTML = '';
  const intro = document.createElement('div');
  intro.className = 'scenario-intro';
  intro.innerHTML = `<div class="intro-title">场景说明</div><div class="intro-text">${scene.intro}</div>`;
  chatMsgs.appendChild(intro);
  document.getElementById('chat-view').classList.add('open');
  document.body.style.overflow = 'hidden';
  setTimeout(() => startConversation(scene), 400);
}

async function callQwen(systemPrompt, msgs) {
  const resp = await fetch(API_URL, {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'Authorization': `Bearer ${API_KEY}`
    },
    body: JSON.stringify({
      model: MODEL,
      messages: [
        { role: 'system', content: systemPrompt },
        ...msgs
      ]
    })
  });
  if (!resp.ok) {
    const err = await resp.json().catch(() => ({}));
    throw new Error(err.error?.message || `HTTP ${resp.status}`);
  }
  const data = await resp.json();
  return data.choices?.[0]?.message?.content || '';
}

async function startConversation(scene) {
  showTyping();
  try {
    const text = await callQwen(scene.system, [{ role: 'user', content: '（开始对话，用你的开场白，直接说话，不要加任何前缀说明）' }]);
    hideTyping();
    messages.push({ role: 'assistant', content: text });
    appendMsg('ai', scene.role, text);
  } catch(e) {
    hideTyping();
    appendError(`连接失败：${e.message}。请检查网络后重试。`);
  }
}

async function sendMessage() {
  const input = document.getElementById('chat-input');
  const text = input.value.trim();
  if (!text || isLoading) return;
  input.value = '';
  input.style.height = 'auto';
  messages.push({ role: 'user', content: text });
  appendMsg('user', '我', text);
  isLoading = true;
  document.getElementById('send-btn').disabled = true;
  showTyping();

  const coachSystem = currentScene.system + `

当对话轮次达到4-6轮，或者培训经理已经成功诊断出根本原因时，结束角色扮演。
用以下格式输出教练反馈（停止角色扮演，直接给反馈）：
---COACH_FEEDBACK---
【做得好的地方】
（列举1-2点具体的好的行为）
【可以改进的地方】
（列举1-2点具体改进建议，给出更好的话术示例）
【核心提醒】
（一句话总结这个场景的关键要点）`;

  try {
    const text = await callQwen(coachSystem, messages);
    hideTyping();
    if (text.includes('---COACH_FEEDBACK---')) {
      const parts = text.split('---COACH_FEEDBACK---');
      if (parts[0].trim()) {
        messages.push({ role: 'assistant', content: parts[0].trim() });
        appendMsg('ai', currentScene.role, parts[0].trim());
      }
      appendCoachFeedback(parts[1].trim());
      if (!completedScenes.includes(currentScene.id)) {
        completedScenes.push(currentScene.id);
        localStorage.setItem('completedScenes', JSON.stringify(completedScenes));
        updateStatCount();
        renderScenes();
      }
    } else {
      messages.push({ role: 'assistant', content: text });
      appendMsg('ai', currentScene.role, text);
    }
  } catch(e) {
    hideTyping();
    appendError(`发送失败：${e.message}`);
  }
  isLoading = false;
  document.getElementById('send-btn').disabled = false;
}

function appendMsg(type, label, text) {
  const msgs = document.getElementById('chat-messages');
  const div = document.createElement('div');
  div.className = `msg ${type}`;
  div.innerHTML = `<div class="msg-label">${label}</div><div class="msg-bubble">${text.replace(/\n/g,'<br>')}</div>`;
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
}

function appendCoachFeedback(text) {
  const msgs = document.getElementById('chat-messages');
  const div = document.createElement('div');
  div.className = 'coach-card';
  div.innerHTML = `<div class="coach-label">🎯 教练反馈</div><div class="coach-text">${text.replace(/\n/g,'<br>')}</div>`;
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
}

function appendError(text) {
  const msgs = document.getElementById('chat-messages');
  const div = document.createElement('div');
  div.className = 'error-card';
  div.textContent = text;
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
}

let typingEl = null;
function showTyping() {
  const msgs = document.getElementById('chat-messages');
  typingEl = document.createElement('div');
  typingEl.className = 'msg ai';
  typingEl.innerHTML = `<div class="msg-bubble typing"><div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div></div>`;
  msgs.appendChild(typingEl);
  msgs.scrollTop = msgs.scrollHeight;
}
function hideTyping() { if (typingEl) { typingEl.remove(); typingEl = null; } }

function closeChat() {
  document.getElementById('chat-view').classList.remove('open');
  document.body.style.overflow = '';
}
function resetChat() { if (currentScene) openScene(currentScene.id); }
function handleKey(e) { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); } }
function autoResize(el) { el.style.height = 'auto'; el.style.height = Math.min(el.scrollHeight, 100) + 'px'; }
function showPage(page) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
  document.getElementById(`page-${page}`).classList.add('active');
  document.querySelectorAll('.nav-tab')[['home','knowledge','progress'].indexOf(page)].classList.add('active');
}

renderScenes();
renderKnowledge();
updateStatCount();
</script>
